<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Etymological Workspace</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{--bg:#12141a; --panel:#1a1d25; --line:#2a2e38; --text:#e8e8ea; --muted:#8a8d98; --accent:#8b7fe8;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:sans-serif;}
  #container{display:grid; grid-template-columns:280px 1fr; min-height:100vh;}
  #sidebar{background:var(--panel); padding:20px; border-right:1px solid var(--line);}
  #canvas-wrap{position:relative; flex-grow:1; overflow:hidden;}
  svg{width:100%; height:100%; cursor:grab;}
  .node circle{stroke-width:2px; cursor:pointer;}
  .node text{font-weight:500; fill:var(--text); pointer-events:none;}
  .edge{fill:none; stroke-opacity:0.5; transition: stroke-opacity 0.3s;}
</style>
</head>
<body>
<div id="container">
  <div id="sidebar">
    <h1>Workspace</h1>
    <button id="loadSample">Load Sample Dataset</button>
  </div>
  <div id="canvas-wrap"><svg id="viz"></svg></div>
</div>

<script>
let selectedInspectedNodeId = null;
let nodes = [], links = [];
let sim, svg, g, linkSel, nodeSel;

// Mapping projection: Perspective (Overview) vs Linear (Tree)
function project(node) {
  if (selectedInspectedNodeId && node.treeX !== undefined) {
    return { x: node.treeX, y: node.treeY };
  }
  const centerX = 900/2, centerY = 600/2;
  const depthDelta = node.layerIndex - (window.focusIndex || 0);
  const zScale = Math.pow(0.5, Math.abs(depthDelta));
  return { 
    x: centerX + (node.x - centerX) * zScale, 
    y: centerY + (node.y - centerY) * zScale 
  };
}

// Tick function logic with safe pathing
function tick() {
  linkSel.attr("d", d => {
    const sP = project(d.source);
    const tP = project(d.target);
    if (selectedInspectedNodeId) {
      return `M${sP.x},${sP.y} L${tP.x},${tP.y}`;
    }
    const cx = (sP.x + tP.x) / 2;
    const cy = Math.min(sP.y, tP.y) - 30;
    return `M${sP.x},${sP.y} Q${cx},${cy} ${tP.x},${tP.y}`;
  });

  nodeSel.attr("transform", d => {
    const p = project(d);
    return `translate(${p.x},${p.y})`;
  });
}

// Click handler to toggle simulation state
function handleNodeClick(e, d) {
  e.stopPropagation();
  if (selectedInspectedNodeId === d.id) {
    selectedInspectedNodeId = null;
    sim.alpha(0.3).restart(); // Wake physics up
  } else {
    selectedInspectedNodeId = d.id;
    sim.stop(); // Freeze physics
  }
  render();
}

// Placeholder for your existing render/setup logic
function render() {
  if (nodeSel) {
    nodeSel.attr("transform", d => {
      const p = project(d);
      return `translate(${p.x},${p.y})`;
    });
    linkSel.attr("d", d => {
        const sP = project(d.source);
        const tP = project(d.target);
        return selectedInspectedNodeId ? `M${sP.x},${sP.y} L${tP.x},${tP.y}` : `M${sP.x},${sP.y} Q${(sP.x+tP.x)/2},${Math.min(sP.y,tP.y)-30} ${tP.x},${tP.y}`;
    });
  }
}
</script>
</body>
</html>
