<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSV layer graph — Head-On Zoom</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#12141a; --panel:#1a1d25; --line:#2a2e38;
    --text:#e8e8ea; --muted:#8a8d98; --err:#e8746a; --accent:#8b7fe8;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  #container{display:grid; grid-template-columns:280px 1fr; min-height:100vh;}
  
  #sidebar {
    background:var(--panel); border-right:1px solid var(--line); padding:20px;
    display:flex; flex-direction:column; gap:20px; overflow-y:auto;
  }
  #main-content { padding:20px; display:flex; flex-direction:column; gap:12px; }
  
  h1{font-size:16px; font-weight:600; margin:0 0 4px;}
  h2{font-size:12px; font-weight:600; color:var(--muted); margin:0 0 8px; text-transform:uppercase; letter-spacing:0.5px;}
  .sub{font-size:12px; color:var(--muted); margin-bottom:4px;}
  
  .field{display:flex; flex-direction:column; gap:6px;}
  .field label{font-size:11px; color:var(--muted);}
  .field input[type=file]{font-size:12px; color:var(--text); width:100%;}
  
  .slider-wrap { display:flex; flex-direction:column; gap:4px; font-size:11px; color:var(--muted); }
  .slider-wrap div { display:flex; justify-content:space-between; }
  
  button{
    font-size:12px; color:var(--text); background:#242832; border:1px solid var(--line);
    border-radius:6px; padding:8px 12px; cursor:pointer; width:100%; text-align:left;
  }
  button:hover{border-color:var(--muted); background:#2a2f3b;}
  button.ghost{background:none; color:var(--muted); border-style:dashed;}
  
  #status{font-size:12px; min-height:16px;}
  #status.error{color:var(--err);}
  #status.ok{color:#6fcf97;}
  
  #legend, #source-filters{display:flex; flex-direction:column; gap:8px; font-size:12px;}
  .chip{display:flex; align-items:center; gap:8px;}
  .dot{width:10px; height:10px; border-radius:50%; display:inline-block;}
  
  .source-item { display:flex; align-items:center; gap:8px; cursor:pointer; font-size:12px; }
  .source-item input { accent-color:var(--accent); margin:0; }
  
  #breadcrumb{font-size:13px; color:var(--muted); min-height:18px;}
  #breadcrumb span{cursor:pointer; color:var(--text); font-weight:500;}
  #breadcrumb span:hover{text-decoration:underline;}
  #breadcrumb .sep{color:var(--muted); margin:0 6px; cursor:default;}
  
  #canvas-wrap{background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; flex-grow:1; position:relative;}
  svg{display:block; width:100%; height:100%; cursor:grab;}
  
  .node circle{stroke-width:1.5px; cursor:pointer; transition: r 0.4s, fill 0.4s, stroke-opacity 0.4s;}
  .node text{font-weight:500; fill:var(--text); pointer-events:none; text-anchor:middle; dominant-baseline:central; transition: font-size 0.4s, fill-opacity 0.4s;}
  .edge{stroke-width:1.2px; fill:none; transition: stroke-opacity 0.4s;}
  
  #empty-state{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--muted); font-size:13px;}
</style>
</head>
<body>
<div id="container">
  <div id="sidebar">
    <div>
      <h1>CSV layer graph</h1>
      <div class="sub">Head-on perspective workspace.</div>
    </div>
    
    <div class="field">
      <label>Nodes CSV (id, label, layer, layer_name)</label>
      <input type="file" id="nodesFile" accept=".csv">
    </div>
    <div class="field">
      <label>Edges CSV (source, target, sources)</label>
      <input type="file" id="edgesFile" accept=".csv">
    </div>
    
    <button id="loadSample">⚡ Load Sample Dataset</button>
    
    <div class="slider-wrap">
      <div><label for="densitySlider">Initial Edge Density</label><span id="densityVal">30%</span></div>
      <input type="range" id="densitySlider" min="10" max="100" value="30">
    </div>

    <hr style="border:0; border-top:1px solid var(--line); margin:4px 0;">
    
    <div>
      <h2>Layers</h2>
      <div id="legend"></div>
    </div>
    
    <div>
      <h2>Filter by Sources</h2>
      <div id="source-filters"></div>
    </div>
    
    <div style="margin-top:auto; display:flex; flex-direction:column; gap:8px;">
      <button class="ghost" id="resetView">Reset Zoom View</button>
    </div>
  </div>

  <div id="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div id="breadcrumb"></div>
      <div id="status"></div>
    </div>

    <div id="canvas-wrap">
      <div id="empty-state">Upload pipeline data files, or click "Load Sample Dataset".</div>
      <svg id="viz" style="display:none;"></svg>
    </div>
  </div>
</div>

<script>
const COLOR_PALETTE = ["#8b7fe8","#3fc9a0","#e88a6a","#e8b83f","#5fa8e8","#d46fc9","#7fbf5f","#e85f7f"];

const SAMPLE_NODES_CSV =
`id,label,layer,layer_name
lang_latin,Latin,1,Languages
lang_french,French,1,Languages
lang_spanish,Spanish,1,Languages
lang_italian,Italian,1,Languages
lang_portuguese,Portuguese,1,Languages
w_aqua,aqua,2,Words
w_eau,eau,2,Words
w_agua,agua,2,Words
w_acqua,acqua,2,Words
w_agua_pt,água,2,Words
w_terra,terra,2,Words
w_terre,terre,2,Words
w_tierra,tierra,2,Words
w_terra_it,terra,2,Words
w_terra_pt,terra,2,Words
d_water,"clear liquid, H2O",3,Definitions
d_baptism,ritual purification,3,Definitions
d_land,solid ground / earth,3,Definitions
d_territory,region under control,3,Definitions`;

const SAMPLE_EDGES_CSV =
`source,target,sources
lang_latin,lang_french,LIV
lang_latin,lang_spanish,LIV;Pokorny
lang_latin,lang_italian,Pokorny
lang_latin,lang_portuguese,LIV
w_aqua,lang_latin,LIV;Picorni
w_eau,lang_french,LIV
w_agua,lang_spanish,Pokorny
w_acqua,lang_italian,Picorni
w_agua_pt,lang_portuguese,LIV
w_terra,lang_latin,Pokorny;LIV
w_terre,lang_french,Pokorny
w_tierra,lang_spanish,LIV
w_terra_it,lang_italian,Picorni
w_terra_pt,lang_portuguese,Pokorny
w_aqua,d_water,LIV;Pokorny
w_eau,d_water,LIV
w_agua,d_water,Pokorny
w_acqua,d_water,Picorni
w_agua_pt,d_water,LIV
w_aqua,d_baptism,Picorni
w_terra,d_land,Pokorny
w_terre,d_land,Pokorny
w_tierra,d_land,LIV
w_terra_it,d_land,Picorni
w_terra_it,d_territory,Picorni;LIV
w_terra_pt,d_land,Pokorny`;

let rawNodeRows = null, rawEdgeRows = null;
let selectedSources = new Set();
let densityThreshold = 0.3;

function setStatus(msg, kind){
  const el = document.getElementById("status");
  el.textContent = msg; el.className = kind || "";
}

function parseFile(file, cb){
  Papa.parse(file, {header:true, dynamicTyping:true, skipEmptyLines:true, complete: r => cb(r.data)});
}

document.getElementById("nodesFile").addEventListener("change", e => {
  if (!e.target.files[0]) return;
  parseFile(e.target.files[0], data => { rawNodeRows = data; tryBuild(); });
});
document.getElementById("edgesFile").addEventListener("change", e => {
  if (!e.target.files[0]) return;
  parseFile(e.target.files[0], data => { rawEdgeRows = data; tryBuild(); });
});
document.getElementById("loadSample").addEventListener("click", () => {
  Papa.parse(SAMPLE_NODES_CSV, {header:true, dynamicTyping:true, skipEmptyLines:true, complete: r => { rawNodeRows = r.data; tryBuild(); }});
  Papa.parse(SAMPLE_EDGES_CSV, {header:true, dynamicTyping:true, skipEmptyLines:true, complete: r => { rawEdgeRows = r.data; updateSourceFilters(); tryBuild(); }});
});

document.getElementById("densitySlider").addEventListener("input", e => {
  densityThreshold = e.target.value / 100;
  document.getElementById("densityVal").textContent = e.target.value + "%";
  if(rawNodeRows && rawEdgeRows) render();
});

function updateSourceFilters() {
  if (!rawEdgeRows) return;
  const foundSources = new Set();
  rawEdgeRows.forEach(r => {
    if (r.sources) {
      String(r.sources).split(';').forEach(s => foundSources.add(s.trim()));
    }
  });
  
  const container = document.getElementById("source-filters");
  container.innerHTML = "";
  
  const allLabel = document.createElement("label");
  allLabel.className = "source-item";
  allLabel.innerHTML = `<input type="checkbox" id="source-all" checked> <strong>Show All Complexity</strong>`;
  container.appendChild(allLabel);
  
  foundSources.forEach(src => {
    selectedSources.add(src);
    const lbl = document.createElement("label");
    lbl.className = "source-item";
    lbl.innerHTML = `<input type="checkbox" class="src-chk" data-src="${src}" checked> ${src}`;
    container.appendChild(lbl);
  });
  
  document.getElementById("source-all").addEventListener("change", e => {
    const chks = container.querySelectorAll(".src-chk");
    chks.forEach(c => { c.checked = e.target.checked; if(e.target.checked) selectedSources.add(c.dataset.src); else selectedSources.delete(c.dataset.src); });
    tryBuild();
  });

  container.querySelectorAll(".src-chk").forEach(chk => {
    chk.addEventListener("change", e => {
      if(e.target.checked) selectedSources.add(e.target.dataset.src);
      else { selectedSources.delete(e.target.dataset.src); document.getElementById("source-all").checked = false; }
      tryBuild();
    });
  });
}

function tryBuild(){
  if (!rawNodeRows || !rawEdgeRows) return;
  try{ buildAndRender(rawNodeRows, rawEdgeRows); } catch(err){ setStatus("Error: " + err.message, "error"); }
}

let sim, svg, g, linkSel, nodeSel, width, height, nodeById, verticalChildren, verticalParents, layerColor;
let focusIndex = 0, activeParentId = null;
let activeAncestors = new Set();

function buildAndRender(nodeRows, edgeRows){
  document.getElementById("empty-state").style.display = "none";
  const svgEl = document.getElementById("viz");
  svgEl.style.display = "block"; svgEl.innerHTML = "";

  const nodes = [];
  nodeRows.forEach(r => {
    if (r.id === undefined || r.id === null || r.id === "" || r.layer === undefined || r.layer === null || r.layer === "") return;
    nodes.push({
      id: String(r.id),
      label: r.label !== undefined && r.label !== null && r.label !== "" ? String(r.label) : String(r.id),
      layer: Number(r.layer),
      layerName: r.layer_name ? String(r.layer_name) : null
    });
  });
  if (nodes.length === 0) throw new Error("No valid rows found in nodes CSV.");

  nodeById = new Map(nodes.map(n => [n.id, n]));
  const layerValues = [...new Set(nodes.map(n => n.layer))].sort((a,b)=>a-b);
  numLayers = layerValues.length;
  const layerValueToIndex = new Map(layerValues.map((v,i) => [v,i]));
  layerColor = layerValues.map((v,i) => COLOR_PALETTE[i % COLOR_PALETTE.length]);
  
  const layerLabel = layerValues.map(v => {
    const match = nodes.find(n => n.layer === v && n.layerName);
    return match ? match.layerName : ("Layer " + v);
  });
  nodes.forEach(n => n.layerIndex = layerValueToIndex.get(n.layer));

  verticalChildren = new Map(nodes.map(n => [n.id, new Set()]));
  verticalParents = new Map(nodes.map(n => [n.id, new Set()]));
  const links = [];

  edgeRows.forEach((r, idx) => {
    const s = r.source !== undefined ? String(r.source) : "";
    const t = r.target !== undefined ? String(r.target) : "";
    if (!s || !t || !nodeById.has(s) || !nodeById.has(t)) return;
    
    if (r.sources) {
      const edgeSrcs = String(r.sources).split(';').map(x => x.trim());
      const hasMatch = edgeSrcs.some(src => selectedSources.has(src));
      if(!hasMatch && selectedSources.size > 0) return;
    }

    const sNode = nodeById.get(s), tNode = nodeById.get(t);
    if (sNode.layerIndex === tNode.layerIndex) return;

    links.push({source:s, target:t, type:r.type || "", indexOrder: idx});
    const [parent, child] = sNode.layerIndex < tNode.layerIndex ? [sNode, tNode] : [tNode, sNode];
    verticalChildren.get(parent.id).add(child.id);
    verticalParents.get(child.id).add(parent.id);
  });

  const legend = document.getElementById("legend");
  legend.innerHTML = "";
  layerValues.forEach((v,i) => {
    legend.innerHTML += `<div class="chip"><span class="dot" style="background:${layerColor[i]}"></span>${layerLabel[i]}</div>`;
  });

  const adjacency = new Map(nodes.map(n => [n.id, new Set()]));
  links.forEach(l => { adjacency.get(l.source).add(l.target); adjacency.get(l.target).add(l.source); });

  width = 700; height = 600;

  svg = d3.select("#viz").attr("viewBox", [0,0,width,height]);
  g = svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.4,4]).on("zoom", e => g.attr("transform", e.transform)));

  linkSel = g.append("g").selectAll("path")
    .data(links).join("path")
    .attr("class", "edge")
    .attr("stroke", d => layerColor[nodeById.get(d.source).layerIndex] || "#666");

  nodeSel = g.append("g").selectAll("g")
    .data(nodes).join("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", (e,d) => { if(!e.active) sim.alphaTarget(0.2).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on("end", (e,d) => { if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

  nodeSel.append("circle");
  nodeSel.append("text").text(d => d.label);

  nodeSel.on("click", (e,d) => {
    e.stopPropagation();
    if (d.layerIndex < numLayers - 1) {
      focusIndex = d.layerIndex + 1; activeParentId = d.id;
      calculateAncestry(); render();
    }
  });
  nodeSel.on("mouseenter", (e,d) => highlight(d.id, adjacency));
  nodeSel.on("mouseleave", () => highlight(null, adjacency));
  
  const resetAll = () => { focusIndex = 0; activeParentId = null; activeAncestors.clear(); render(); };
  svg.on("click", resetAll);
  document.getElementById("resetView").onclick = resetAll;

  // Head-On Force Configuration: Target a shared center coordinate
  sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
      const sN = nodeById.get(d.source.id || d.source);
      const tN = nodeById.get(d.target.id || d.target);
      // Pushes current focused layer nodes further outward into a larger ring radius
      return (sN.layerIndex === focusIndex || tN.layerIndex === focusIndex) ? 180 : 70;
    }).strength(0.6))
    .force("charge", d3.forceManyBody().strength(d => d.layerIndex === focusIndex ? -300 : -80))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collide", d3.forceCollide().radius(d => d.layerIndex === focusIndex ? 45 : 20))
    .on("tick", () => {
      linkSel.attr("d", d => `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`);
      nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
    });

  window.__layerLabel = layerLabel;
  setStatus(`Loaded ${nodes.length} nodes, ${links.length} structural connections active.`, "ok");
  render();
}

function calculateAncestry() {
  activeAncestors.clear();
  if (!activeParentId) return;
  let queue = [activeParentId];
  while(queue.length > 0) {
    let curr = queue.shift(); activeAncestors.add(curr);
    let parents = verticalParents.get(curr);
    if (parents) parents.forEach(p => { if(!activeAncestors.has(p)) queue.push(p); });
  }
}

function highlight(hoverId, adjacency){
  if (hoverId === null){
    nodeSel.select("circle").attr("stroke-width", 1.5);
    linkSel.style("stroke-opacity", null);
    return;
  }
  const connected = adjacency.get(hoverId);
  nodeSel.select("circle").attr("stroke-width", d => (d.id===hoverId || connected.has(d.id)) ? 3 : 1.5);
  linkSel.style("stroke-opacity", d => (d.source.id===hoverId || d.target.id===hoverId || d.source===hoverId || d.target===hoverId) ? 1 : 0.1);
}

function render(){
  const activeChildren = activeParentId ? verticalChildren.get(activeParentId) : null;
  const totalEdges = linkSel.size();
  const maxAllowedEdgeIndex = Math.ceil(totalEdges * densityThreshold);

  // Re-adjust force parameters based on new zoom focus positioning targets
  if (sim) {
    sim.force("center", d3.forceCenter(width / 2, height / 2));
    sim.alpha(0.3).restart();
  }

  nodeSel.each(function(d) {
    const el = d3.select(this);
    let dist = d.layerIndex - focusIndex;
    
    let scaleFactor;
    let opacityValue;
    
    if (dist === 0) {
      // Foreground focus ring
      scaleFactor = 1.0;
      opacityValue = activeChildren ? (activeChildren.has(d.id) ? 1.0 : 0.0) : 1.0;
    } else if (dist < 0 && activeAncestors.has(d.id)) {
      // Vanishing background tunnel (ancestors)
      let depthSteps = Math.abs(dist);
      scaleFactor = depthSteps === 1 ? 0.55 : 0.35;
      opacityValue = depthSteps === 1 ? 0.50 : 0.25;
    } else if (focusIndex === 0 && d.layerIndex === 1) {
      // Initial state sneak-peek
      scaleFactor = 0.65;
      opacityValue = 0.25;
    } else {
      // Completely hidden outside of the depth tunnel focus
      scaleFactor = 0.0;
      opacityValue = 0.0;
    }

    let baseRadius = 24;

    el.select("circle")
      .attr("r", baseRadius * scaleFactor)
      .attr("fill", layerColor[d.layerIndex] + (dist === 0 ? "44" : "15"))
      .attr("stroke", layerColor[d.layerIndex])
      .style("stroke-opacity", opacityValue);

    el.select("text")
      .attr("font-size", (dist === 0 ? 11 : 8) + "px")
      .style("fill-opacity", opacityValue)
      .style("display", scaleFactor === 0 ? "none" : "block");
      
    el.style("opacity", opacityValue)
      .style("pointer-events", opacityValue > 0 ? "auto" : "none");
  });

  linkSel.transition().duration(400)
    .style("opacity", (d, i) => {
      if (i > maxAllowedEdgeIndex && focusIndex === 0) return 0.0;

      const sNode = nodeById.get(d.source.id || d.source);
      const tNode = nodeById.get(d.target.id || d.target);
      
      const sVisible = (sNode.layerIndex === focusIndex && (!activeChildren || activeChildren.has(sNode.id))) || activeAncestors.has(sNode.id) || (focusIndex === 0 && sNode.layerIndex === 1);
      const tVisible = (tNode.layerIndex === focusIndex && (!activeChildren || activeChildren.has(tNode.id))) || activeAncestors.has(tNode.id) || (focusIndex === 0 && tNode.layerIndex === 1);
      
      if (sVisible && tVisible) {
        // Fade the edges connecting backwards into the screen depth
        return (sNode.layerIndex === focusIndex && tNode.layerIndex === focusIndex) ? 0.8 : 0.2;
      }
      return 0.0;
    });

  renderBreadcrumb();
}

function renderBreadcrumb(){
  const bc = document.getElementById("breadcrumb");
  bc.innerHTML = "";
  const labels = window.__layerLabel || [];
  for (let i = 0; i <= focusIndex; i++){
    const span = document.createElement("span");
    span.textContent = labels[i] || ("Layer " + i);
    span.onclick = () => {
      focusIndex = i;
      if (i === 0) activeParentId = null;
      else {
        let targetId = null;
        activeAncestors.forEach(id => { if (nodeById.get(id).layerIndex === i - 1) targetId = id; });
        activeParentId = targetId;
      }
      calculateAncestry(); render();
    };
    bc.appendChild(span);
    if (i < focusIndex) bc.innerHTML += `<span class="sep"> › </span>`;
  }
}
</script>
</body>
</html>
